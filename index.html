<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật Ký Cảm Xúc 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #555;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(238, 156, 167, 0.3);
            position: relative;
        }

        h1 {
            text-align: center;
            color: #ff758c;
            margin-bottom: 10px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sync-status {
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #aaa;
            transition: color 0.3s;
        }

        .sync-status.online {
            color: #4caf50;
        }

        .sync-status.error {
            color: #ff4757;
        }

        /* ===== Màn hình đăng nhập ===== */
        .login-screen {
            text-align: center;
            padding: 30px 10px 10px;
        }

        .login-screen p {
            color: #999;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            color: #444;
            border: 1px solid #ffd3da;
            border-radius: 15px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 117, 140, 0.25);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }

        .login-loading {
            text-align: center;
            color: #999;
            padding: 40px 10px;
            font-weight: 700;
        }

        /* ===== Thanh thông tin người dùng ===== */
        .user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #fff0f3;
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #ffb6c1;
        }

        .user-info span {
            font-weight: 700;
            font-size: 14px;
            color: #555;
        }

        .logout-btn {
            background: transparent;
            color: #ff758c;
            border: 1px solid #ffb6c1;
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 12px;
            box-shadow: none;
        }

        .logout-btn:hover {
            transform: none;
            background: #ffe1e6;
            box-shadow: none;
        }

        .hidden {
            display: none !important;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            background: #fff0f3;
            padding: 20px;
            border-radius: 20px;
            border: 2px dashed #ffb6c1;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 700;
            color: #ff758c;
            font-size: 14px;
        }

        select {
            padding: 10px 15px;
            border-radius: 15px;
            border: 1px solid #ffb6c1;
            background: #fff;
            color: #555;
            font-size: 16px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus {
            box-shadow: 0 0 0 3px rgba(255, 117, 140, 0.2);
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            align-self: flex-end;
            margin-bottom: 2px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .day-box {
            background: white;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            position: relative;
            border: 1px solid transparent;
        }

        .day-box:hover {
            transform: translateY(-3px);
            border-color: #ffb6c1;
            box-shadow: 0 6px 15px rgba(255, 182, 193, 0.4);
        }

        .day-num {
            font-size: 12px;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 5px;
        }

        .day-emoji {
            font-size: 24px;
        }

        .stats-section {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stats-section h3 {
            color: #ff758c;
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            text-align: center;
        }

        .stat-item {
            background: #fff0f3;
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
        }

        .stat-item span {
            font-size: 18px;
            margin-right: 5px;
        }

        @media (max-width: 500px) {
            .calendar {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>✨ Trạm Cảm Xúc 🎀</h1>

        <!-- Đang kiểm tra trạng thái đăng nhập -->
        <div class="login-loading" id="authLoading">⏳ Đang kiểm tra đăng nhập...</div>

        <!-- Màn hình đăng nhập (ẩn mặc định) -->
        <div class="login-screen hidden" id="loginScreen">
            <p>Đăng nhập bằng Gmail để lưu nhật ký cảm xúc riêng của bạn 🌸</p>
            <button class="google-btn" id="googleLoginBtn">
                <svg viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                    <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                    <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                    <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571.001-.001 6.19 5.238 6.19 5.238C40.205 35.836 44 30.5 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                </svg>
                Đăng nhập bằng Google
            </button>
            <div class="sync-status" id="authStatus" style="margin-top: 15px;"></div>
        </div>

        <!-- Nội dung app (ẩn cho tới khi đăng nhập) -->
        <div id="appContent" class="hidden">
            <div class="user-bar">
                <div class="user-info">
                    <img id="userAvatar" src="" alt="avatar">
                    <span id="userName"></span>
                </div>
                <button class="logout-btn" id="logoutBtn">Đăng xuất</button>
            </div>

            <div class="sync-status" id="syncStatus">⏳ Đang kết nối Firebase...</div>

            <div class="controls">
                <div class="control-group">
                    <label for="daySelect">Ngày trong tháng:</label>
                    <select id="daySelect"></select>
                </div>

                <div class="control-group">
                    <label for="emotionSelect">Hôm nay bạn thế nào?</label>
                    <select id="emotionSelect">
                        <option value="🥰">🥰 Yêu đời rạng rỡ</option>
                        <option value="😄">😄 Vui vẻ năng lượng</option>
                        <option value="😌">😌 Bình yên thư giãn</option>
                        <option value="🥺">🥺 Hơi xúc động</option>
                        <option value="😫">😫 Mệt mỏi rã rời</option>
                        <option value="😡">😡 Bực mình chói chang</option>
                        <option value="😭">😭 Buồn xỉu up xỉu down</option>
                        <option value="✨">✨ Đầy tự hào</option>
                    </select>
                </div>

                <button id="saveBtn" onclick="saveEmotion()">Ghi lại 💕</button>
            </div>

            <div class="calendar" id="calendar"></div>

            <div class="stats-section">
                <h3>📊 Thống kê tháng này của bạn</h3>
                <div class="stats-grid" id="stats">
                    <!-- Dữ liệu thống kê sẽ hiển thị ở đây -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ===== Firebase SDK (modular, qua CDN) =====
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getFirestore,
            doc,
            setDoc,
            onSnapshot
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyDK3tkrs9mghCsC0BMw-C8CoQMutpXaCIM",
            authDomain: "camxuc26-5eed3.firebaseapp.com",
            projectId: "camxuc26-5eed3",
            storageBucket: "camxuc26-5eed3.firebasestorage.app",
            messagingSenderId: "343814947744",
            appId: "1:343814947744:web:0c4477bd01251a28625ac5"
        };

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        const daysInMonth = 31;
        let emotionsData = {};
        let isSaving = false;
        let unsubscribeSnapshot = null;
        let currentUid = null;

        // ===== Phần tử DOM =====
        const authLoadingEl = document.getElementById('authLoading');
        const loginScreenEl = document.getElementById('loginScreen');
        const appContentEl = document.getElementById('appContent');
        const authStatusEl = document.getElementById('authStatus');
        const syncStatusEl = document.getElementById('syncStatus');
        const saveBtn = document.getElementById('saveBtn');
        const userAvatarEl = document.getElementById('userAvatar');
        const userNameEl = document.getElementById('userName');

        function setSyncStatus(text, type) {
            syncStatusEl.textContent = text;
            syncStatusEl.className = 'sync-status' + (type ? ' ' + type : '');
        }

        function setAuthStatus(text, type) {
            authStatusEl.textContent = text;
            authStatusEl.className = 'sync-status' + (type ? ' ' + type : '');
        }

        // ===== Đăng nhập / Đăng xuất =====
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            setAuthStatus('⏳ Đang mở cửa sổ đăng nhập Google...', '');
            try {
                await signInWithPopup(auth, googleProvider);
                // onAuthStateChanged sẽ tự xử lý phần còn lại
            } catch (error) {
                console.error("Lỗi đăng nhập Google:", error);
                setAuthStatus('⚠️ Đăng nhập thất bại: ' + (error.code || error.message), 'error');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Lỗi đăng xuất:", error);
            }
        });

        // ===== Theo dõi trạng thái đăng nhập =====
        onAuthStateChanged(auth, (user) => {
            authLoadingEl.classList.add('hidden');

            // Hủy lắng nghe dữ liệu cũ nếu có (đổi tài khoản / đăng xuất)
            if (unsubscribeSnapshot) {
                unsubscribeSnapshot();
                unsubscribeSnapshot = null;
            }

            if (user) {
                currentUid = user.uid;
                loginScreenEl.classList.add('hidden');
                appContentEl.classList.remove('hidden');

                userNameEl.textContent = user.displayName || user.email || 'Người dùng';
                userAvatarEl.src = user.photoURL || 'https://api.dicebear.com/7.x/initials/svg?seed=' + encodeURIComponent(user.email || 'U');

                initCalendarOnce();
                listenToUserData(user.uid);
            } else {
                currentUid = null;
                appContentEl.classList.add('hidden');
                loginScreenEl.classList.remove('hidden');
                setAuthStatus('', '');
            }
        });

        let calendarInitialized = false;
        function initCalendarOnce() {
            if (calendarInitialized) return;
            calendarInitialized = true;

            const daySelect = document.getElementById('daySelect');
            for (let i = 1; i <= daysInMonth; i++) {
                daySelect.innerHTML += `<option value="${i}">Ngày ${i}</option>`;
            }
            const today = new Date().getDate();
            if (today <= daysInMonth) {
                daySelect.value = today;
            }
        }

        // Mỗi người dùng có 1 document riêng, định danh bằng uid
        // collection "emotionDiary" -> document "{uid}"
        function listenToUserData(uid) {
            const userDocRef = doc(db, "emotionDiary", uid);
            unsubscribeSnapshot = onSnapshot(
                userDocRef,
                (snapshot) => {
                    emotionsData = snapshot.exists() ? (snapshot.data().data || {}) : {};
                    setSyncStatus('🟢 Đã đồng bộ với Firebase', 'online');
                    updateUI();
                },
                (error) => {
                    console.error("Lỗi khi lắng nghe Firestore:", error);
                    setSyncStatus('⚠️ Lỗi kết nối Firebase (xem console)', 'error');
                }
            );
        }

        window.saveEmotion = async function saveEmotion() {
            if (isSaving || !currentUid) return;

            const day = document.getElementById('daySelect').value;
            const emotion = document.getElementById('emotionSelect').value;

            // Cập nhật local trước để UI phản hồi nhanh
            const previousData = { ...emotionsData };
            emotionsData[day] = emotion;
            updateUI();

            isSaving = true;
            saveBtn.disabled = true;
            setSyncStatus('⏳ Đang lưu lên Firebase...', '');

            try {
                const userDocRef = doc(db, "emotionDiary", currentUid);
                await setDoc(userDocRef, { data: emotionsData }, { merge: true });
                setSyncStatus('🟢 Đã đồng bộ với Firebase', 'online');
            } catch (error) {
                console.error("Lỗi khi lưu lên Firestore:", error);
                emotionsData = previousData; // rollback nếu lưu thất bại
                updateUI();
                setSyncStatus('⚠️ Lưu thất bại, kiểm tra kết nối / quyền Firestore', 'error');
            } finally {
                isSaving = false;
                saveBtn.disabled = false;
            }
        };

        function updateUI() {
            renderCalendar();
            renderStats();
        }

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            for (let i = 1; i <= daysInMonth; i++) {
                const dayBox = document.createElement('div');
                dayBox.className = 'day-box';

                // Mặc định là trái tim trắng nếu chưa chọn cảm xúc
                const emoji = emotionsData[i] || '🤍';

                dayBox.innerHTML = `
                    <div class="day-num">${i}</div>
                    <div class="day-emoji">${emoji}</div>
                `;
                calendar.appendChild(dayBox);
            }
        }

        function renderStats() {
            const statsContainer = document.getElementById('stats');
            const counts = {};

            // Đếm số lượng từng loại cảm xúc
            Object.values(emotionsData).forEach(emoji => {
                counts[emoji] = (counts[emoji] || 0) + 1;
            });

            statsContainer.innerHTML = '';

            if (Object.keys(counts).length === 0) {
                statsContainer.innerHTML = '<p style="grid-column: 1/-1; color: #999;">Bạn chưa ghi lại cảm xúc nào. Hãy bắt đầu nhé! 🌸</p>';
                return;
            }

            for (const [emoji, count] of Object.entries(counts)) {
                statsContainer.innerHTML += `
                    <div class="stat-item">
                        <span>${emoji}</span> ${count} ngày
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
